name: Daily AI News to Telegram

on:
  schedule:
    - cron: '30 1 * * *'   # 07:00 AM IST  (UTC+5:30 → UTC 01:30)
    - cron: '30 13 * * *'  # 07:00 PM IST  (UTC+5:30 → UTC 13:30)
  workflow_dispatch:        # Manual trigger for testing

jobs:
  send-ai-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine morning / evening period
        id: period
        run: |
          HOUR=$(date -u +%-H)
          if [ "$HOUR" -lt 12 ]; then
            echo "label=Morning ☀️" >> "$GITHUB_OUTPUT"
          else
            echo "label=Evening 🌙" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch and send AI news
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python fetch_ai_news.py "${{ steps.period.outputs.label }}"
